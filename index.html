<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVS_CAD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg:#16181c; --panel:#1d2026; --panel2:#22262d; --line:#2e333c;
    --ink:#d6dae2; --dim:#7d8492; --faint:#4a505c;
    --acc:#ff7a1a; --acc-dim:#b85a16; --ok:#5fd38a; --err:#ff5d5d;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'Space Grotesk',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px}
  .app{display:grid;grid-template-rows:44px 1fr;height:100vh;height:100dvh}

  .bar{display:flex;align-items:center;gap:14px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
  .logo{font-weight:700;letter-spacing:.5px;font-size:15px}
  .logo b{color:var(--acc)}
  .bar .tag{font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:3px;padding:2px 6px}
  .bar .spacer{flex:1}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;padding:6px 12px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:border-color .12s,background .12s}
  .btn:hover{border-color:var(--acc)}
  .btn:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
  .btn.primary{background:var(--acc);border-color:var(--acc);color:#16181c;font-weight:600}
  .btn.primary:hover{background:#ff8d3d}
  .btn:disabled{opacity:.45;cursor:default}
  .btn.toggle.on{border-color:var(--acc);color:var(--acc)}

  .main{display:grid;grid-template-columns:208px 1fr 248px;min-height:0}
  .side{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .side.right{border-right:none;border-left:1px solid var(--line)}
  .sec{padding:10px 12px;border-bottom:1px solid var(--line)}
  .sec h3{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;font-weight:600}

  .prims{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .prim{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--ink)}
  .prim:hover{border-color:var(--acc);color:var(--acc)}
  .prim.cutter{border-style:dashed}
  .prim svg{display:block;margin:0 auto 4px;stroke:currentColor;fill:none;stroke-width:1.3}

  .tree{flex:1;overflow-y:auto;padding:6px}
  .node{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--dim)}
  .node:hover{background:var(--panel2);color:var(--ink)}
  .node.sel{background:#2a2218;color:var(--acc);border:1px solid var(--acc-dim)}
  .node .dot{width:8px;height:8px;border-radius:2px;flex:none}
  .node.cut .dot{border-radius:50%;border:1px dashed var(--acc);background:transparent !important}
  .node .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .node .x{opacity:0;color:var(--dim);font-size:13px;line-height:1}
  .node:hover .x{opacity:1}
  .node .x:hover{color:var(--err)}
  .empty{color:var(--faint);font-size:11px;padding:14px 10px;text-align:center;line-height:1.6}

  .vp{position:relative;min-width:0;min-height:0;background:#101216}
  #cv{display:block;width:100%;height:100%;touch-action:none}
  .hud{position:absolute;top:10px;left:12px;font-family:var(--mono);font-size:10px;color:var(--faint);pointer-events:none;line-height:1.7}
  .hud b{color:var(--dim);font-weight:400}
  .axes{position:absolute;bottom:78px;right:14px;font-family:var(--mono);font-size:10px;color:var(--faint);pointer-events:none}

  .cmd{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(680px,92%);}
  .cmdbox{display:flex;align-items:center;gap:10px;background:rgba(22,24,28,.92);border:1px solid var(--line);border-radius:6px;padding:10px 14px;backdrop-filter:blur(6px);box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .cmdbox:focus-within{border-color:var(--acc)}
  .cmdbox .gt{color:var(--acc);font-family:var(--mono);font-weight:700}
  .cmdbox input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--mono);font-size:13px}
  .cmdbox input::placeholder{color:var(--faint)}
  .cmdmsg{font-family:var(--mono);font-size:10px;margin-top:6px;padding-left:4px;min-height:14px;color:var(--dim)}
  .chatlog{display:none;max-height:30vh;overflow-y:auto;margin-bottom:8px;background:rgba(22,24,28,.92);border:1px solid var(--line);border-radius:6px;padding:10px;backdrop-filter:blur(6px)}
  .chatlog.show{display:block}
  .msg{font-size:12px;line-height:1.5;margin-bottom:8px;max-width:92%}
  .msg.user{margin-left:auto;text-align:right;color:var(--ink)}
  .msg.user .who{color:var(--acc)}
  .msg.ai{color:var(--dim)}
  .msg .who{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:2px;color:var(--faint)}
  .chatreset{font-family:var(--mono);font-size:9px;color:var(--faint);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0}
  .chatreset:hover{color:var(--err)}
  .cmdmsg.err{color:var(--err)}
  .cmdmsg.ok{color:var(--ok)}
  .spin{display:none;width:13px;height:13px;border:2px solid var(--faint);border-top-color:var(--acc);border-radius:50%;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spin{animation-duration:2s}}

  .insp{flex:1;overflow-y:auto}
  .fld{margin-bottom:10px}
  .fld label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
  .num{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:3px;color:var(--ink);font-family:var(--mono);font-size:11px;padding:5px 6px;outline:none}
  .num:focus{border-color:var(--acc)}
  input[type=color]{width:100%;height:26px;background:var(--panel2);border:1px solid var(--line);border-radius:3px;padding:2px;cursor:pointer}
  .insp .none{color:var(--faint);font-size:11px;padding:16px 12px;text-align:center;line-height:1.6}
  .meta{font-family:var(--mono);font-size:10px;color:var(--faint);line-height:1.8;padding-top:4px}
  .actions{display:flex;gap:6px;margin-top:4px}
  .actions .btn{flex:1;font-size:11px;padding:5px 0}
  .opToggle{display:flex;gap:5px}
  .opToggle .btn{flex:1;font-size:11px;padding:5px 0}
  .opToggle .btn.on{background:var(--acc);border-color:var(--acc);color:#16181c;font-weight:600}

  .menuBtn{display:none}
  .mobileOnly{display:none}
  .backdrop{position:fixed;inset:44px 0 0 0;background:rgba(0,0,0,.5);z-index:25;display:none}
  .backdrop.show{display:block}
  @media (max-width:768px){
    .main{grid-template-columns:1fr}
    .side{position:fixed;top:44px;bottom:0;left:0;width:min(300px,84vw);z-index:30;
      transform:translateX(-105%);transition:transform .22s ease;box-shadow:8px 0 30px rgba(0,0,0,.5)}
    .side.right{left:auto;right:0;transform:translateX(105%);box-shadow:-8px 0 30px rgba(0,0,0,.5)}
    .side.open{transform:translateX(0)}
    .menuBtn{display:inline-block;padding:6px 10px}
    .bar{gap:8px;padding:0 10px}
    .bar .tag{display:none}
    .bar .btn:not(.menuBtn):not(.primary){display:none}
    .hud{font-size:9px;line-height:1.5}
    .axes{display:none}
    .cmd{bottom:10px;width:94%}
    .cmdbox{padding:8px 10px}
    .prim{padding:10px 4px}
    .node{padding:9px 8px}
    .mobileOnly{display:block}
  }
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <button class="btn menuBtn" id="leftBtn" aria-label="Parts panel">☰</button>
    <div class="logo">DVS<b>_</b>CAD</div>
    <span class="tag">AI TEXT-TO-CAD · BOOLEAN ENGINE · mm · Y-UP</span>
    <div class="spacer"></div>
    <button class="btn toggle on" id="ghostBtn">Show cutters</button>
    <button class="btn" id="clearBtn">Clear scene</button>
    <button class="btn primary" id="stlBtn">Export STL</button>
    <button class="btn menuBtn" id="inspBtn" aria-label="Inspector panel">Edit</button>
  </div>

  <div class="main">
    <div class="backdrop" id="backdrop"></div>
    <div class="side" id="leftPanel">
      <div class="sec">
        <h3>Solids</h3>
        <div class="prims">
          <button class="prim" data-add="box"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 8l8-4 8 4v8l-8 4-8-4z M4 8l8 4 8-4 M12 12v8"/></svg>Box</button>
          <button class="prim" data-add="cylinder"><svg width="22" height="22" viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="7" ry="2.6"/><path d="M5 6v12M19 6v12"/><ellipse cx="12" cy="18" rx="7" ry="2.6"/></svg>Cylinder</button>
          <button class="prim" data-add="sphere"><svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><ellipse cx="12" cy="12" rx="8" ry="3"/></svg>Sphere</button>
          <button class="prim" data-add="cone"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 4L5 18h14z"/><ellipse cx="12" cy="18" rx="7" ry="2.4"/></svg>Cone</button>
          <button class="prim" data-add="torus"><svg width="22" height="22" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="5"/><ellipse cx="12" cy="12" rx="3.5" ry="1.8"/></svg>Torus</button>
          <button class="prim" data-add="plate"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 14l9-4 9 4-9 4z M3 14v2l9 4 9-4v-2"/></svg>Plate</button>
        </div>
      </div>
      <div class="sec">
        <h3>Cutters · subtract</h3>
        <div class="prims">
          <button class="prim cutter" data-cut="cylinder"><svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke-dasharray="3 2"/><circle cx="12" cy="12" r="1.4"/></svg>Hole</button>
          <button class="prim cutter" data-cut="box"><svg width="22" height="22" viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="8" stroke-dasharray="3 2"/></svg>Slot</button>
        </div>
      </div>
      <div class="sec mobileOnly">
        <h3>Scene</h3>
        <div style="display:flex;gap:6px">
          <button class="btn toggle on" id="ghostBtnM" style="flex:1;font-size:11px">Show cutters</button>
          <button class="btn" id="clearBtnM" style="flex:1;font-size:11px">Clear scene</button>
        </div>
      </div>
      <div class="sec" style="border-bottom:none;display:flex;flex-direction:column;flex:1;min-height:0">
        <h3>Scene tree</h3>
        <div class="tree" id="tree"></div>
      </div>
    </div>

    <div class="vp" id="vpEl">
      <canvas id="cv"></canvas>
      <div class="hud">
        <span id="hudHints"><b>DRAG</b> orbit &nbsp; <b>WHEEL</b> zoom &nbsp; <b>SHIFT+DRAG</b> pan &nbsp; <b>CLICK</b> select</span><br>
        <span id="hudStats">parts 0 · tris 0</span>
      </div>
      <div class="axes">X<span style="color:#e25555">—</span> Y<span style="color:#5fd38a">—</span> Z<span style="color:#5b9bd5">—</span></div>
      <div class="cmd">
        <div class="chatlog" id="chatlog"></div>
        <div class="cmdbox">
          <span class="gt">&gt;</span>
          <input id="cmdIn" placeholder="describe a part… e.g. a flanged bearing mount with four M6 bolt holes" autocomplete="off">
          <div class="spin" id="spin"></div>
          <button class="btn primary" id="genBtn" style="padding:4px 12px;font-size:11px">Generate</button>
        </div>
        <div class="cmdmsg" id="cmdMsg"></div>
      </div>
    </div>

    <div class="side right" id="rightPanel">
      <div class="sec" style="flex:1;overflow-y:auto">
        <h3>Inspector</h3>
        <div class="insp" id="insp"><div class="none">Select a part to edit its dimensions, position and material.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===================================================================
   CSG — BSP-tree constructive solid geometry (Evan Wallace's csg.js
   algorithm, adapted for THREE BufferGeometry)
=================================================================== */
const EPS = 1e-5;
class CVert{
  constructor(pos, normal){ this.pos=pos; this.normal=normal; }
  clone(){ return new CVert(this.pos.clone(), this.normal.clone()); }
  flip(){ this.normal.negate(); }
  interpolate(o, t){
    return new CVert(this.pos.clone().lerp(o.pos,t), this.normal.clone().lerp(o.normal,t).normalize());
  }
}
class CPlane{
  constructor(normal,w){ this.normal=normal; this.w=w; }
  static fromPoints(a,b,c){
    const n = new THREE.Vector3().subVectors(b,a).cross(new THREE.Vector3().subVectors(c,a)).normalize();
    return new CPlane(n, n.dot(a));
  }
  clone(){ return new CPlane(this.normal.clone(), this.w); }
  flip(){ this.normal.negate(); this.w = -this.w; }
  splitPolygon(poly, copl_f, copl_b, front, back){
    const COPL=0, FRONT=1, BACK=2, SPAN=3;
    let polyType=0; const types=[];
    for(const v of poly.vertices){
      const t = this.normal.dot(v.pos) - this.w;
      const type = t < -EPS ? BACK : t > EPS ? FRONT : COPL;
      polyType |= type; types.push(type);
    }
    switch(polyType){
      case COPL: (this.normal.dot(poly.plane.normal) > 0 ? copl_f : copl_b).push(poly); break;
      case FRONT: front.push(poly); break;
      case BACK: back.push(poly); break;
      case SPAN: {
        const f=[], b=[];
        for(let i=0;i<poly.vertices.length;i++){
          const j=(i+1)%poly.vertices.length;
          const ti=types[i], tj=types[j];
          const vi=poly.vertices[i], vj=poly.vertices[j];
          if(ti!==BACK) f.push(vi);
          if(ti!==FRONT) b.push(ti!==BACK ? vi.clone() : vi);
          if((ti|tj)===SPAN){
            const t = (this.w - this.normal.dot(vi.pos)) / this.normal.dot(new THREE.Vector3().subVectors(vj.pos,vi.pos));
            const v = vi.interpolate(vj,t);
            f.push(v); b.push(v.clone());
          }
        }
        if(f.length>=3) front.push(new CPoly(f, poly.shared));
        if(b.length>=3) back.push(new CPoly(b, poly.shared));
      } break;
    }
  }
}
class CPoly{
  constructor(vertices, shared){
    this.vertices=vertices; this.shared=shared;
    this.plane = CPlane.fromPoints(vertices[0].pos, vertices[1].pos, vertices[2].pos);
  }
  clone(){ return new CPoly(this.vertices.map(v=>v.clone()), this.shared); }
  flip(){ this.vertices.reverse().forEach(v=>v.flip()); this.plane.flip(); }
}
class CNode{
  constructor(polygons){ this.plane=null; this.front=null; this.back=null; this.polygons=[]; if(polygons) this.build(polygons); }
  clone(){
    const n = new CNode();
    n.plane = this.plane && this.plane.clone();
    n.front = this.front && this.front.clone();
    n.back  = this.back && this.back.clone();
    n.polygons = this.polygons.map(p=>p.clone());
    return n;
  }
  invert(){
    this.polygons.forEach(p=>p.flip());
    if(this.plane) this.plane.flip();
    if(this.front) this.front.invert();
    if(this.back) this.back.invert();
    const t=this.front; this.front=this.back; this.back=t;
  }
  clipPolygons(polys){
    if(!this.plane) return polys.slice();
    let front=[], back=[];
    for(const p of polys) this.plane.splitPolygon(p, front, back, front, back);
    if(this.front) front = this.front.clipPolygons(front);
    back = this.back ? this.back.clipPolygons(back) : [];
    return front.concat(back);
  }
  clipTo(bsp){
    this.polygons = bsp.clipPolygons(this.polygons);
    if(this.front) this.front.clipTo(bsp);
    if(this.back) this.back.clipTo(bsp);
  }
  allPolygons(){
    let p = this.polygons.slice();
    if(this.front) p = p.concat(this.front.allPolygons());
    if(this.back) p = p.concat(this.back.allPolygons());
    return p;
  }
  build(polys){
    if(!polys.length) return;
    if(!this.plane) this.plane = polys[0].plane.clone();
    const front=[], back=[];
    for(const p of polys) this.plane.splitPolygon(p, this.polygons, this.polygons, front, back);
    if(front.length){ if(!this.front) this.front=new CNode(); this.front.build(front); }
    if(back.length){ if(!this.back) this.back=new CNode(); this.back.build(back); }
  }
}
const CSG = {
  fromGeometry(geom, matrix){
    const polys=[];
    const pos = geom.attributes.position, idx = geom.index;
    const nm = matrix ? new THREE.Matrix3().getNormalMatrix(matrix) : null;
    const triCount = idx ? idx.count/3 : pos.count/3;
    for(let t=0;t<triCount;t++){
      const vs=[];
      for(let k=0;k<3;k++){
        const vi = idx ? idx.getX(t*3+k) : t*3+k;
        const p = new THREE.Vector3().fromBufferAttribute(pos,vi);
        if(matrix) p.applyMatrix4(matrix);
        vs.push(p);
      }
      const n = new THREE.Vector3().subVectors(vs[1],vs[0]).cross(new THREE.Vector3().subVectors(vs[2],vs[0]));
      if(n.lengthSq() < 1e-12) continue;
      n.normalize();
      polys.push(new CPoly(vs.map(p=>new CVert(p, n.clone()))));
    }
    return polys;
  },
  subtract(polysA, polysB){
    const a = new CNode(polysA.map(p=>p.clone()));
    const b = new CNode(polysB.map(p=>p.clone()));
    a.invert(); a.clipTo(b); b.clipTo(a); b.invert(); b.clipTo(a); b.invert();
    a.build(b.allPolygons()); a.invert();
    return a.allPolygons();
  },
  toGeometry(polys){
    const verts=[], norms=[];
    for(const poly of polys){
      const n = poly.plane.normal;
      for(let i=2;i<poly.vertices.length;i++){
        [poly.vertices[0], poly.vertices[i-1], poly.vertices[i]].forEach(v=>{
          verts.push(v.pos.x, v.pos.y, v.pos.z);
          norms.push(n.x, n.y, n.z);
        });
      }
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    g.setAttribute('normal', new THREE.Float32BufferAttribute(norms,3));
    return g;
  }
};

/* ============ scene setup ============ */
const cv = document.getElementById('cv'), vpEl = document.getElementById('vpEl');
const renderer = new THREE.WebGLRenderer({canvas:cv, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101216);
scene.fog = new THREE.Fog(0x101216, 600, 1400);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);

scene.add(new THREE.HemisphereLight(0x8899bb, 0x222428, .55));
const key = new THREE.DirectionalLight(0xffffff, .9);
key.position.set(180,260,140); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
const sh = 260; Object.assign(key.shadow.camera,{left:-sh,right:sh,top:sh,bottom:-sh,far:900});
scene.add(key);
const fill = new THREE.DirectionalLight(0xff7a1a, .12); fill.position.set(-140,80,-120); scene.add(fill);

const groundM = new THREE.Mesh(new THREE.PlaneGeometry(3000,3000), new THREE.ShadowMaterial({opacity:.35}));
groundM.rotation.x = -Math.PI/2; groundM.receiveShadow = true; scene.add(groundM);
const grid = new THREE.GridHelper(1000, 100, 0x3a4150, 0x21252d);
grid.material.transparent = true; grid.material.opacity = .6; scene.add(grid);
scene.add(new THREE.GridHelper(1000, 10, 0x4a525f, 0x2c313a));
scene.add(new THREE.AxesHelper(40));

/* ============ orbit controls ============ */
const ctrl = { theta: Math.PI/4.4, phi: Math.PI/3.1, dist: 320, target: new THREE.Vector3(0,25,0) };
function applyCam(){
  const t = ctrl.target;
  camera.position.set(
    t.x + ctrl.dist*Math.sin(ctrl.phi)*Math.cos(ctrl.theta),
    t.y + ctrl.dist*Math.cos(ctrl.phi),
    t.z + ctrl.dist*Math.sin(ctrl.phi)*Math.sin(ctrl.theta));
  camera.lookAt(t);
}
let drag = null, pinch = null;
const pointers = new Map();
function panCam(dx, dy){
  const sc = ctrl.dist*0.0012;
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);
  const up = new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);
  ctrl.target.addScaledVector(right,-dx*sc).addScaledVector(up,dy*sc);
}
cv.addEventListener('pointerdown', e => {
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  cv.setPointerCapture(e.pointerId);
  if(pointers.size === 1){
    drag = {x:e.clientX, y:e.clientY, pan: e.shiftKey || e.button===2, moved:false};
  } else if(pointers.size === 2){
    drag = null;
    const [a,b] = [...pointers.values()];
    pinch = {d: Math.hypot(a.x-b.x, a.y-b.y), mx:(a.x+b.x)/2, my:(a.y+b.y)/2};
  }
});
cv.addEventListener('pointermove', e => {
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pinch && pointers.size === 2){
    const [a,b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    if(d > 0 && pinch.d > 0) ctrl.dist = Math.min(2200, Math.max(25, ctrl.dist * pinch.d / d));
    panCam(mx - pinch.mx, my - pinch.my);
    pinch = {d, mx, my};
    applyCam();
    return;
  }
  if(!drag) return;
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
  if(Math.abs(dx)+Math.abs(dy)>3) drag.moved = true;
  drag.x=e.clientX; drag.y=e.clientY;
  if(drag.pan){ panCam(dx,dy); }
  else {
    ctrl.theta += dx*0.0055;
    ctrl.phi = Math.min(Math.PI-0.06, Math.max(0.06, ctrl.phi - dy*0.0055));
  }
  applyCam();
});
function endPointer(e){
  if(drag && !drag.moved && e.type==='pointerup' && e.button===0 && pointers.size===1) pick(e);
  pointers.delete(e.pointerId);
  if(pointers.size < 2) pinch = null;
  if(pointers.size === 0) drag = null;
}
cv.addEventListener('pointerup', endPointer);
cv.addEventListener('pointercancel', endPointer);

/* ============ parts model ============ */
/* part = {id, name, type, op:'solid'|'cut', params, mesh, color} */
let parts = [], selected = null, uid = 1, showGhosts = true;

const DEFAULTS = {
  box:{w:40,h:40,d:40}, plate:{w:80,h:6,d:60},
  cylinder:{r:18,h:50}, sphere:{r:22}, cone:{r:20,h:46}, torus:{r:24,t:7},
};
function buildGeom(type,p){
  switch(type){
    case 'box': case 'plate': return new THREE.BoxGeometry(p.w,p.h,p.d);
    case 'cylinder': return new THREE.CylinderGeometry(p.r,p.r,p.h,32);
    case 'sphere':   return new THREE.SphereGeometry(p.r,24,16);
    case 'cone':     return new THREE.ConeGeometry(p.r,p.h,32);
    case 'torus':    { const g=new THREE.TorusGeometry(p.r,p.t,14,36); g.rotateX(Math.PI/2); return g; }
    default: return new THREE.BoxGeometry(20,20,20);
  }
}
function defaultY(type,p){
  if(type==='sphere') return p.r;
  if(type==='torus') return p.t;
  return (p.h!==undefined? p.h:40)/2;
}
function solidMat(hex){ return new THREE.MeshStandardMaterial({color:hex, metalness:.35, roughness:.45}); }
function cutterMat(){
  return new THREE.MeshStandardMaterial({color:0xff7a1a, transparent:true, opacity:.28, depthWrite:false, metalness:0, roughness:1});
}

function addPart({type,name,op,params,position,rotation,color}){
  op = op==='cut' ? 'cut' : 'solid';
  const p = Object.assign({}, DEFAULTS[type]||DEFAULTS.box, params||{});
  const mesh = new THREE.Mesh(buildGeom(type,p), op==='cut'? cutterMat() : solidMat(color||'#9aa4b5'));
  mesh.castShadow = mesh.receiveShadow = (op==='solid');
  const pos = position || [0, defaultY(type,p), 0];
  mesh.position.set(pos[0],pos[1],pos[2]);
  if(rotation) mesh.rotation.set(...rotation.map(d=>d*Math.PI/180));
  scene.add(mesh);
  const part = {id:uid++, name:name||`${type}_${uid}`, type, op, params:p, mesh, color: op==='cut'?'#ff7a1a':(color||'#9aa4b5')};
  mesh.userData.partId = part.id;
  mesh.visible = (op==='solid') || showGhosts;
  parts.push(part);
  refreshTree();
  scheduleRecompute();
  return part;
}
function removePart(part){
  scene.remove(part.mesh); part.mesh.geometry.dispose();
  parts = parts.filter(x=>x!==part);
  if(selected===part){ selected=null; refreshInspector(); }
  refreshTree(); scheduleRecompute();
}

/* ============ boolean recompute pipeline ============ */
let recomputeTimer = null;
function scheduleRecompute(){
  clearTimeout(recomputeTimer);
  recomputeTimer = setTimeout(recomputeAll, 120);
}
function worldBox(geom, matrix){
  geom.computeBoundingBox();
  return geom.boundingBox.clone().applyMatrix4(matrix);
}
function recomputeAll(){
  const cutters = parts.filter(p=>p.op==='cut');
  const solids = parts.filter(p=>p.op==='solid');
  for(const part of solids){
    part.mesh.updateWorldMatrix(true,false);
    const base = buildGeom(part.type, part.params);
    const partBox = worldBox(base, part.mesh.matrixWorld);
    const hits = cutters.filter(c=>{
      c.mesh.updateWorldMatrix(true,false);
      const cb = worldBox(c.mesh.geometry, c.mesh.matrixWorld);
      return partBox.intersectsBox(cb);
    });
    if(!hits.length){
      part.mesh.geometry.dispose();
      part.mesh.geometry = base;
      continue;
    }
    try{
      const inv = new THREE.Matrix4().copy(part.mesh.matrixWorld).invert();
      let csgA = CSG.fromGeometry(base);
      for(const c of hits){
        const rel = new THREE.Matrix4().multiplyMatrices(inv, c.mesh.matrixWorld);
        const csgB = CSG.fromGeometry(buildGeom(c.type, c.params), rel);
        csgA = CSG.subtract(csgA, csgB);
      }
      part.mesh.geometry.dispose();
      part.mesh.geometry = CSG.toGeometry(csgA);
      base.dispose();
    }catch(err){
      console.warn('CSG failed for', part.name, err);
      part.mesh.geometry.dispose();
      part.mesh.geometry = base;
    }
  }
  refreshStats();
}

function select(part){
  if(selected) selected.mesh.material.emissive?.setHex(0x000000);
  selected = part;
  if(part) part.mesh.material.emissive.setHex(part.op==='cut'? 0x552200 : 0x33260e);
  refreshTree(); refreshInspector();
}

const ray = new THREE.Raycaster(), ptr = new THREE.Vector2();
function pick(e){
  const r = cv.getBoundingClientRect();
  ptr.set(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1);
  ray.setFromCamera(ptr, camera);
  const visible = parts.filter(p=>p.mesh.visible).map(p=>p.mesh);
  const hit = ray.intersectObjects(visible)[0];
  select(hit ? parts.find(p=>p.id===hit.object.userData.partId) : null);
}

/* ============ tree ============ */
const treeEl = document.getElementById('tree');
function refreshTree(){
  if(!parts.length){ treeEl.innerHTML = '<div class="empty">No parts yet.<br>Type a description below<br>or add a primitive.</div>'; return; }
  treeEl.innerHTML = '';
  parts.forEach(p=>{
    const n = document.createElement('div');
    n.className = 'node' + (p===selected?' sel':'') + (p.op==='cut'?' cut':'');
    n.innerHTML = `<span class="dot" style="background:${p.color}"></span><span class="nm">${p.op==='cut'?'⊖ ':''}${p.name}</span><span class="x" title="Delete">×</span>`;
    n.onclick = ()=>select(p);
    n.querySelector('.x').onclick = ev=>{ ev.stopPropagation(); removePart(p); };
    treeEl.appendChild(n);
  });
}
function refreshStats(){
  let tris=0;
  parts.filter(p=>p.op==='solid').forEach(p=>{
    const g=p.mesh.geometry; tris += (g.index? g.index.count : g.attributes.position.count)/3;
  });
  const cuts = parts.filter(p=>p.op==='cut').length;
  document.getElementById('hudStats').textContent =
    `solids ${parts.length-cuts} · cutters ${cuts} · tris ${Math.round(tris).toLocaleString()}`;
}

/* ============ inspector ============ */
const inspEl = document.getElementById('insp');
const PARAM_LABELS = {w:'Width',h:'Height',d:'Depth',r:'Radius',t:'Tube R'};
function numInput(val, cb){
  const i=document.createElement('input');
  i.type='number'; i.step='1'; i.className='num'; i.value=Math.round(val*100)/100;
  i.onchange = ()=>cb(parseFloat(i.value)||0);
  return i;
}
function refreshInspector(){
  if(!selected){ inspEl.innerHTML = '<div class="none">Select a part to edit its dimensions, position and material.</div>'; return; }
  inspEl.innerHTML = '';
  const p = selected;

  const nameF=document.createElement('div'); nameF.className='fld';
  nameF.innerHTML='<label>Name</label>';
  const ni=document.createElement('input'); ni.className='num'; ni.value=p.name;
  ni.onchange=()=>{ p.name=ni.value||p.name; refreshTree(); };
  nameF.appendChild(ni); inspEl.appendChild(nameF);

  /* op toggle */
  const opF=document.createElement('div'); opF.className='fld';
  opF.innerHTML='<label>Operation</label>';
  const ot=document.createElement('div'); ot.className='opToggle';
  ['solid','cut'].forEach(op=>{
    const b=document.createElement('button'); b.className='btn'+(p.op===op?' on':'');
    b.textContent = op==='solid'?'Solid':'Subtract';
    b.onclick=()=>{
      if(p.op===op) return;
      p.op = op;
      p.mesh.material.dispose();
      p.mesh.material = op==='cut'? cutterMat() : solidMat(p.color==='#ff7a1a'?'#9aa4b5':p.color);
      if(op==='cut') p.color='#ff7a1a'; else if(p.color==='#ff7a1a') p.color='#9aa4b5';
      p.mesh.castShadow = p.mesh.receiveShadow = (op==='solid');
      p.mesh.visible = (op==='solid')||showGhosts;
      select(p); scheduleRecompute();
    };
    ot.appendChild(b);
  });
  opF.appendChild(ot); inspEl.appendChild(opF);

  const dimF=document.createElement('div'); dimF.className='fld';
  dimF.innerHTML='<label>Dimensions (mm)</label>';
  const dr=document.createElement('div'); dr.className='row3';
  Object.keys(p.params).forEach(k=>{
    const wrap=document.createElement('div');
    const lab=document.createElement('label'); lab.textContent=PARAM_LABELS[k]||k; lab.style.fontSize='8px';
    wrap.appendChild(lab);
    wrap.appendChild(numInput(p.params[k], v=>{ p.params[k]=Math.max(0.1,v); p.mesh.geometry.dispose(); p.mesh.geometry=buildGeom(p.type,p.params); scheduleRecompute(); }));
    dr.appendChild(wrap);
  });
  dimF.appendChild(dr); inspEl.appendChild(dimF);

  const posF=document.createElement('div'); posF.className='fld';
  posF.innerHTML='<label>Position X / Y / Z</label>';
  const pr=document.createElement('div'); pr.className='row3';
  ['x','y','z'].forEach(ax=> pr.appendChild(numInput(p.mesh.position[ax], v=>{ p.mesh.position[ax]=v; scheduleRecompute(); })));
  posF.appendChild(pr); inspEl.appendChild(posF);

  const rotF=document.createElement('div'); rotF.className='fld';
  rotF.innerHTML='<label>Rotation ° X / Y / Z</label>';
  const rr=document.createElement('div'); rr.className='row3';
  ['x','y','z'].forEach(ax=> rr.appendChild(numInput(p.mesh.rotation[ax]*180/Math.PI, v=>{ p.mesh.rotation[ax]=v*Math.PI/180; scheduleRecompute(); })));
  rotF.appendChild(rr); inspEl.appendChild(rotF);

  if(p.op==='solid'){
    const colF=document.createElement('div'); colF.className='fld';
    colF.innerHTML='<label>Material color</label>';
    const ci=document.createElement('input'); ci.type='color'; ci.value=p.color;
    ci.oninput=()=>{ p.color=ci.value; p.mesh.material.color.set(ci.value); refreshTree(); };
    colF.appendChild(ci); inspEl.appendChild(colF);
  }

  const act=document.createElement('div'); act.className='actions';
  const dup=document.createElement('button'); dup.className='btn'; dup.textContent='Duplicate';
  dup.onclick=()=>{
    const np = addPart({type:p.type, name:p.name+'_copy', op:p.op, params:{...p.params},
      position:[p.mesh.position.x+20,p.mesh.position.y,p.mesh.position.z+20],
      rotation:[p.mesh.rotation.x,p.mesh.rotation.y,p.mesh.rotation.z].map(r=>r*180/Math.PI),
      color:p.color});
    select(np);
  };
  const del=document.createElement('button'); del.className='btn'; del.textContent='Delete'; del.style.color='var(--err)';
  del.onclick=()=>removePart(p);
  act.appendChild(dup); act.appendChild(del); inspEl.appendChild(act);

  const meta=document.createElement('div'); meta.className='meta';
  meta.textContent=`type ${p.type} · op ${p.op} · id ${String(p.id).padStart(3,'0')}`;
  inspEl.appendChild(meta);
}

/* ============ AI text-to-CAD ============ */
const cmdIn=document.getElementById('cmdIn'), genBtn=document.getElementById('genBtn'),
      spin=document.getElementById('spin'), cmdMsg=document.getElementById('cmdMsg');
function setMsg(t,cls){ cmdMsg.textContent=t; cmdMsg.className='cmdmsg '+(cls||''); }

const SYS = `You are the geometry kernel of a conversational parametric CAD program with a boolean engine. You receive chat history; the user's latest message ends with CURRENT_SCENE, the full list of parts currently in the editor.
Respond with ONLY compact JSON, no markdown fences: {"reply":"one short sentence to the user","parts":[...]}
"parts" must be the COMPLETE desired scene after applying the request — include unchanged existing parts verbatim. Omit "parts" entirely if the request needs no geometry change (e.g. a question).
Part schema: {"type":"box|cylinder|sphere|cone|torus","op":"solid|cut","name":"feature","params":{...},"position":[x,y,z],"rotation":[rx,ry,rz],"color":"#hex"}
params: box {w,h,d}; cylinder {r,h} (axis=Y); sphere {r}; cone {r,h} (apex up; rotate 180 on X for apex-down); torus {r,t} (lies flat, hole axis=Y).
Rules:
- Units mm. Y up, ground y=0; geometry rests on the ground. Rotation in degrees, XYZ order.
- op "cut" is true boolean subtraction from every solid it intersects: bores, bolt holes, slots, pockets. Cutters must extend 2mm+ beyond pierced faces.
- Bolt clearance: M6 r=3.3, M8 r=4.5, M10 r=5.5. Realistic machined proportions.
- Muted colors (#8a93a6 steel, #b8743a brass, #c0c5ce aluminum). 3-14 parts. Compact JSON.`;

let chatHistory = [];
const chatlog = document.getElementById('chatlog');
function addBubble(role, text){
  chatlog.classList.add('show');
  const m = document.createElement('div');
  m.className = 'msg ' + (role==='user'?'user':'ai');
  m.innerHTML = `<span class="who">${role==='user'?'you':'dvs'}</span>`;
  m.appendChild(document.createTextNode(text));
  chatlog.appendChild(m);
  chatlog.scrollTop = chatlog.scrollHeight;
}
function resetChat(){
  chatHistory = []; chatlog.innerHTML=''; chatlog.classList.remove('show');
  setMsg('New conversation.','');
}
function sceneSnapshot(){
  return parts.map(p=>({type:p.type, op:p.op, name:p.name, params:p.params,
    position:[p.mesh.position.x,p.mesh.position.y,p.mesh.position.z].map(v=>Math.round(v*10)/10),
    rotation:[p.mesh.rotation.x,p.mesh.rotation.y,p.mesh.rotation.z].map(r=>Math.round(r*180/Math.PI)),
    color:p.color}));
}
async function generate(){
  const prompt = cmdIn.value.trim();
  if(!prompt) return;
  genBtn.disabled=true; spin.style.display='block';
  addBubble('user', prompt);
  setMsg('Thinking…','');
  try{
    const content = prompt + "\n\nCURRENT_SCENE:" + JSON.stringify(sceneSnapshot());
    const messages = [...chatHistory, {role:'user', content}];
    const res = await fetch('/api/generate',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages, system: SYS })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error||'API error');
    const clean = (data.text||'').replace(/```json|```/g,'').trim();
    const spec = JSON.parse(clean.slice(clean.indexOf('{')));
    chatHistory.push({role:'user', content: prompt});
    chatHistory.push({role:'assistant', content: spec.reply || 'Done.'});
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    addBubble('ai', spec.reply || 'Done.');
    if(spec.parts && spec.parts.length){
      [...parts].forEach(removePart);
      const KEYMAP = {width:'w',height:'h',depth:'d',radius:'r',tube:'t',tube_radius:'t',length:'w'};
      const made=[];
      spec.parts.slice(0,18).forEach((sp,i)=>{
        if(!DEFAULTS[sp.type]) sp.type='box';
        if(sp.params) for(const k of Object.keys(sp.params)){
          const m = KEYMAP[k.toLowerCase()];
          if(m && !(m in sp.params)){ sp.params[m]=sp.params[k]; delete sp.params[k]; }
        }
        made.push(addPart({type:sp.type, op:sp.op,
          name:(sp.name||sp.type+'_'+i).replace(/\s+/g,'_').toLowerCase(),
          params:sp.params, position:sp.position, rotation:sp.rotation, color:sp.color}));
      });
      select(made.find(m=>m.op==='solid')||made[0]||null);
      frameAll();
      const cuts = made.filter(m=>m.op==='cut').length;
      setMsg(`${made.length-cuts} solids, ${cuts} cuts.`,'ok');
    } else {
      setMsg('No geometry change.','');
    }
    cmdIn.value='';
  }catch(err){
    console.error(err);
    setMsg('Failed: '+err.message,'err');
  }finally{
    genBtn.disabled=false; spin.style.display='none';
  }
}
genBtn.onclick = generate;
cmdIn.addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); });

function frameAll(){
  const solids = parts.filter(p=>p.op==='solid');
  if(!solids.length) return;
  const box = new THREE.Box3();
  solids.forEach(p=>box.expandByObject(p.mesh));
  const c = box.getCenter(new THREE.Vector3()), sz = box.getSize(new THREE.Vector3());
  ctrl.target.copy(c);
  ctrl.dist = Math.max(120, Math.max(sz.x,sz.y,sz.z)*2.2);
  applyCam();
}

/* ============ STL export (solids only, post-boolean) ============ */
document.getElementById('stlBtn').onclick = ()=>{
  const solids = parts.filter(p=>p.op==='solid');
  if(!solids.length){ setMsg('Nothing to export.','err'); return; }
  recomputeAll();
  let out='solid dvs_cad\n';
  const v=[new THREE.Vector3(),new THREE.Vector3(),new THREE.Vector3()];
  const n=new THREE.Vector3(), ab=new THREE.Vector3(), cb=new THREE.Vector3();
  solids.forEach(p=>{
    p.mesh.updateWorldMatrix(true,false);
    const g=p.mesh.geometry, posA=g.attributes.position, idx=g.index;
    const triCount = idx? idx.count/3 : posA.count/3;
    for(let t=0;t<triCount;t++){
      for(let k=0;k<3;k++){
        const vi = idx? idx.getX(t*3+k) : t*3+k;
        v[k].fromBufferAttribute(posA,vi).applyMatrix4(p.mesh.matrixWorld);
      }
      cb.subVectors(v[2],v[1]); ab.subVectors(v[0],v[1]); n.crossVectors(cb,ab).normalize();
      out += ` facet normal ${n.x.toExponential(4)} ${n.y.toExponential(4)} ${n.z.toExponential(4)}\n  outer loop\n`;
      for(let k=0;k<3;k++) out += `   vertex ${v[k].x.toExponential(4)} ${v[k].y.toExponential(4)} ${v[k].z.toExponential(4)}\n`;
      out += '  endloop\n endfacet\n';
    }
  });
  out += 'endsolid dvs_cad\n';
  const blob = new Blob([out],{type:'model/stl'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='dvs_cad_export.stl'; a.click();
  URL.revokeObjectURL(a.href);
  setMsg('Exported dvs_cad_export.stl','ok');
};
